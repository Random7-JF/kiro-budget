<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found</title>
</head>
<body>
  <main class="not-found-page" role="alert">
    <h1>404 &ndash; Not found</h1>
    <p class="error-message">
      {{if .Message}}{{.Message}}{{else}}The requested resource was not found.{{end}}
    </p>
    <p><a href="/">Return to the dashboard</a></p>
  </main>
</body>
</html>
