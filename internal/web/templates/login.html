{{define "login"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in &middot; Budget Tracker</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); color: #0f172a;
    }
    .login-card {
      background: #fff; width: 360px; max-width: calc(100vw - 32px);
      border-radius: 16px; padding: 28px; box-shadow: 0 10px 40px rgba(0,0,0,.35);
    }
    .login-card h1 { margin: 0; font-size: 1.4rem; letter-spacing: -.02em; }
    .login-card .sub { margin: 4px 0 20px; color: #64748b; font-size: .9rem; }
    .login-error {
      background: #fef2f2; border: 1px solid #fecaca; color: #991b1b;
      border-radius: 10px; padding: 10px 12px; font-size: .88rem; margin: 0 0 16px;
    }
    form { display: flex; flex-direction: column; gap: 14px; }
    label { display: flex; flex-direction: column; gap: 6px; font-size: .78rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .04em; }
    input {
      padding: 11px 12px; font-size: .95rem; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; color: #0f172a;
    }
    input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.15); background: #fff; }
    button {
      margin-top: 4px; padding: 12px; font-size: .95rem; font-weight: 600; color: #fff;
      background: #4f46e5; border: none; border-radius: 10px; cursor: pointer;
    }
    button:hover { background: #4338ca; }
    .login-hint { margin: 18px 0 0; font-size: .82rem; color: #94a3b8; text-align: center; }
    .login-hint code { background: #f1f5f9; padding: 1px 6px; border-radius: 6px; color: #334155; }
  </style>
</head>
<body>
  <main class="login-card">
    <h1>Budget Tracker</h1>
    <p class="sub">Sign in to continue</p>
    {{if .Error}}<p class="login-error" role="alert">{{.Error}}</p>{{end}}
    <form method="post" action="/login">
      <label for="l-username">Username
        <input id="l-username" name="username" type="text" autocomplete="username" autofocus required>
      </label>
      <label for="l-password">Password
        <input id="l-password" name="password" type="password" autocomplete="current-password" required>
      </label>
      <button type="submit">Sign in</button>
    </form>
    <p class="login-hint">Demo account: <code>test</code> / <code>password123</code></p>
  </main>
</body>
</html>
{{end}}
