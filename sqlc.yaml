version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/store/schema.sql"
    queries: "internal/store/queries.sql"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/store/sqlcgen"
        emit_json_tags: false
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
